<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectRoom - Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 950: '#020617' },
                        accent: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-dark-900 text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 bg-dark-950 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden border border-slate-800">

    <div class="relative hidden lg:flex flex-col justify-between p-12 bg-gradient-to-br to-accent-600 from-dark-900">
        <div>
            <div class="flex items-center gap-2 mb-6">
                <img src="/img/logo.png" alt="Logo" class="w-8 h-8 opacity-90">
                <span class="text-2xl font-bold text-white tracking-wide">ProjectRoom</span>
            </div>
            <h2 class="text-4xl font-bold text-white mb-4">Gestiona tus proyectos con claridad.</h2>
            <p class="text-blue-100/80 text-lg">Únete a tu equipo y lleva el control de tus proyectos y tareas en un solo lugar.</p>
        </div>
        <div class="text-sm text-blue-200/60">© 2026 ProjectRoom Inc.</div>

        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 rounded-full bg-accent-500/20 blur-3xl"></div>
    </div>

    <div class="w-full max-w-lg border border-slate-800 p-8 sm:p-10 relative">

        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white">Crear Cuenta</h2>
            <p class="text-slate-400 mt-2 text-sm">Completa tus datos para empezar.</p>
        </div>

        <div th:if="${error}"
             class="mb-4 text-red-500 text-sm text-center"
             th:text="${error}">
        </div>

        <form action="/register" th:object="${usuario}" method="POST" class="space-y-5">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="nombre" class="block text-sm font-medium text-slate-300 mb-1.5">Nombre</label>
                    <input type="text" th:field="*{nombre}" id="nombre" name="nombre" required maxlength="128" placeholder="Ej: Juan"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>

                <div>
                    <label for="apellido" class="block text-sm font-medium text-slate-300 mb-1.5">Apellido</label>
                    <input type="text" th:field="*{apellido}" id="apellido" name="apellido" required maxlength="128" placeholder="Ej: Pérez"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Correo Electrónico</label>
                <div class="relative">
                    <i class="ph ph-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input type="email" th:field="*{email}" id="email" name="email" required maxlength="128" placeholder="nombre@empresa.com"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block pl-10 p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Contraseña</label>
                <div class="relative">
                    <i class="ph ph-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input type="password" th:field="*{password}" id="password" name="password" required minlength="8" maxlength="8" placeholder="Exactamente 8 caracteres"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block pl-10 p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>
            </div>

            <button type="submit" class="w-full text-white bg-accent-600 hover:bg-accent-500 font-bold rounded-lg text-sm px-5 py-3 text-center transition-all shadow-lg shadow-accent-600/20 mt-4">
                Registrarse
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-400">¿Ya tienes cuenta? <a href="/login" class="text-accent-500 hover:underline">Inicia Sesión</a></p>
        </div>
    </div>
</div>
</body>
</html>
