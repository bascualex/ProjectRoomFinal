<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectRoom - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 950: '#020617' },
                        accent: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-dark-900 text-slate-200 font-sans antialiased h-screen flex items-center justify-center p-4">

<div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 bg-dark-950 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden border border-slate-800">

    <div class="relative hidden lg:flex flex-col justify-between p-12 bg-gradient-to-br to-accent-600 from-dark-900">
        <div>
            <div class="flex items-center gap-2 mb-6">
                <img src="/img/logo.png" alt="Logo" class="w-8 h-8 opacity-90">
                <span class="text-2xl font-bold text-white tracking-wide">ProjectRoom</span>
            </div>
            <h2 class="text-4xl font-bold text-white mb-4">Gestiona tus proyectos con claridad.</h2>
            <p class="text-blue-100/80 text-lg">Únete a tu equipo y lleva el control de tus proyectos y tareas en un solo lugar.</p>
        </div>
        <div class="text-sm text-blue-200/60">© 2026 ProjectRoom Inc.</div>
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 rounded-full bg-accent-500/20 blur-3xl"></div>
    </div>

    <div class="p-8 md:p-12 flex flex-col justify-center">

        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white mb-2">¡Hola de nuevo!</h2>
            <p class="text-slate-400">Introduce tus credenciales para acceder.</p>
        </div>

        <!-- MENSAJE DE ERROR -->
        <div th:if="${error}"
             class="mb-4 text-red-500 text-sm text-center"
             th:text="${error}">
        </div>

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Correo Electrónico</label>
                <div class="relative">
                    <i class="ph ph-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@empresa.com"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block pl-10 p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-sm font-medium text-slate-300">Contraseña</label>
                </div>
                <div class="relative">
                    <i class="ph ph-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input type="password" id="password" name="password" required minlength="8" maxlength="8" placeholder="Exactamente 8 caracteres"
                           class="w-full bg-dark-900 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-accent-500 focus:border-accent-500 block pl-10 p-3 transition-colors autofill:shadow-[inset_0_0_0px_1000px_#0f172a] [&:-webkit-autofill]:[-webkit-text-fill-color:#e2e8f0]">
                </div>
            </div>

            <button type="submit" class="w-full text-white bg-accent-600 hover:bg-accent-500 font-bold rounded-lg text-sm px-5 py-3 text-center transition-all shadow-lg shadow-accent-600/20">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-400">¿No tienes cuenta? <a th:href="@{/register}" class="text-accent-500 hover:underline">Regístrate</a></p>
        </div>
    </div>
</div>
</body>
</html>
