<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectRoom - Integrantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 950: '#020617' },
                        accent: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-dark-900 text-slate-200 font-sans antialiased h-screen flex overflow-hidden">

<input type="checkbox" id="menu-toggle" class="peer hidden" />
<label for="menu-toggle" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm peer-checked:block md:hidden cursor-pointer"></label>

<aside class="fixed inset-y-0 left-0 z-50 w-64 bg-dark-950 flex flex-col border-r border-slate-800 transform -translate-x-full transition-transform duration-300 ease-in-out peer-checked:translate-x-0 md:translate-x-0 md:static">
    <div class="h-16 flex items-center justify-between px-6 border-b border-slate-800">
        <a th:href="@{/}" class="flex items-center">
            <img src="/img/logo.png" alt="Logo" class="w-8 h-8 mr-2">
            <span class="text-xl font-bold tracking-wide text-white">ProjectRoom</span>
        </a>
        <label for="menu-toggle" class="md:hidden text-slate-400 cursor-pointer hover:text-white"><i class="ph ph-x text-2xl"></i></label>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Principal</p>
        <a th:href="@{/}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
            <i class="ph ph-kanban text-xl mr-3"></i><span class="font-medium">Proyectos</span>
        </a>
        <a th:href="@{/tareas}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
            <i class="ph ph-check-square-offset text-xl mr-3"></i><span class="font-medium">Mis Tareas</span>
        </a>
        <a th:href="@{/estadisticas}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
            <i class="ph ph-chart-line-up text-xl mr-3"></i><span class="font-medium">Estadísticas</span>
        </a>
        <a th:href="@{/archivados}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
            <i class="ph ph-archive text-xl mr-3"></i><span class="font-medium">Proyectos Archivados</span>
        </a>
        <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-8 mb-2">Administración</p>
        <a href="#" class="flex items-center px-4 py-3 bg-accent-600/10 text-accent-500 rounded-lg transition-colors">
            <i class="ph ph-users text-xl mr-3"></i><span class="font-medium">Integrantes</span>
        </a>
        <a th:href="@{/roles_permisos}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
            <i class="ph ph-shield-checkered text-xl mr-3"></i><span class="font-medium">Roles y Permisos</span>
        </a>
        <a href="#" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg group transition-colors">
            <i class="ph ph-gear text-xl mr-3"></i>
            <span class="font-medium">Configuración</span>
        </a>
    </nav>
    <div class="p-4 border-t border-slate-800">
        <div class="flex items-center gap-3">
            <img th:src="@{'/' + ${usuario.foto}}" alt="User" class="w-10 h-10 rounded-full border-2 border-slate-700 object-cover">
            <div class="flex flex-col truncate">
                <span th:text="${usuario.nombre + ' ' + usuario.apellido}" class="text-sm font-semibold text-white"></span>
                <span th:text="${usuario.email}" class="text-xs text-slate-500"></span>
            </div>
        </div>
    </div>
</aside>

<main class="flex-1 flex flex-col h-full overflow-hidden w-full">

    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-4 md:px-8 bg-dark-900/50 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <label for="menu-toggle" class="md:hidden text-slate-400 hover:text-white cursor-pointer"><i class="ph ph-list text-2xl"></i></label>
            <h1 class="text-xl font-semibold text-white">Integrantes</h1>
        </div>
        <div class="relative sm:block">
            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="busqueda" placeholder="Buscar integrante..."
                   oninput="filtrar(this.value)"
                   class="bg-dark-800 text-sm pl-10 pr-4 py-2 rounded-full border border-slate-700 focus:outline-none focus:border-accent-500 text-slate-300 w-64 transition-all">
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-10" id="lista-integrantes">

        <div th:if="${proyectos.isEmpty()}" class="text-center text-slate-600 py-20">
            <i class="ph ph-users text-5xl mb-4"></i>
            <p class="font-medium">No hay integrantes en tus proyectos activos</p>
        </div>

        <!-- Por cada proyecto -->
        <div th:each="proyecto : ${proyectos}" class="proyecto-section">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-3 h-3 rounded-full" th:style="'background-color: ' + ${proyecto.color}"></div>
                <h2 th:text="${proyecto.nombre}" class="text-lg font-bold text-white"></h2>
                <span class="text-xs text-slate-500" th:text="${proyecto.integrantes.size()} + ' miembros'"></span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <div th:each="integrante : ${proyecto.integrantes}"
                     class="integrante-card group bg-dark-800 rounded-xl border border-slate-700/50 p-4 flex flex-col gap-4 hover:border-slate-600 hover:bg-dark-800/80 transition-all">

                    <div class="flex items-center gap-3">
                        <img th:src="@{'/' + ${integrante.usuario.foto}}"
                             th:alt="${integrante.usuario.nombre}"
                             class="w-10 h-10 rounded-full object-cover border-2 border-slate-700">
                        <div class="flex-1 truncate">
                            <h3 th:text="${integrante.usuario.nombre + ' ' + integrante.usuario.apellido}"
                                class="text-white font-medium text-sm group-hover:text-accent-400 transition-colors truncate"></h3>
                            <p th:text="${integrante.usuario.email}" class="text-[11px] text-slate-500 truncate"></p>
                        </div>
                    </div>

                    <div class="flex items-center justify-between border-t border-slate-700/50 pt-3">
                        <span class="text-[11px] px-2.5 py-1 rounded-full border font-semibold"
                              th:text="${integrante.rol != null ? integrante.rol.nombre : 'Sin rol'}"
                              th:style="${integrante.rol != null ? 'color: ' + integrante.rol.color + '; background-color: ' + integrante.rol.color + '15; border-color: ' + integrante.rol.color + '40' : 'color: #94a3b8; border-color: #334155'}">
                        </span>
                        <div class="flex gap-2">
                            <button class="text-slate-500 hover:text-white p-1 rounded hover:bg-slate-700 transition-colors" title="Editar">
                                <i class="ph ph-pencil-simple text-sm"></i>
                            </button>
                            <button class="text-slate-500 hover:text-red-400 p-1 rounded hover:bg-slate-700 transition-colors" title="Eliminar">
                                <i class="ph ph-trash text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
function filtrar(query) {
    query = query.toLowerCase();
    document.querySelectorAll('.integrante-card').forEach(card => {
        const nombre = card.querySelector('h3').textContent.toLowerCase();
        const email = card.querySelector('p').textContent.toLowerCase();
        card.style.display = (nombre.includes(query) || email.includes(query)) ? '' : 'none';
    });
}
</script>

</body>
</html>
